<!DOCTYPE html>
<html>
<head>
    <title>Nebula Chat Demo</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; }
        #messages { height: 400px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; }
        #input-area { display: flex; margin-top: 10px; }
        #msg-input { flex: 1; padding: 8px; }
        #send-btn { padding: 8px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .msg { margin: 5px 0; }
        .msg-user { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
<h1>Nebula Chat Demo</h1>
<div id="messages"></div>
<div id="input-area">
    <input id="msg-input" placeholder="Type a message..." />
    <button id="send-btn">Send</button>
</div>

<script>
    // 简易WebSocket客户端
    let ws = new WebSocket('ws://localhost:8080/ws/temp');
    let messages = document.getElementById('messages');
    let input = document.getElementById('msg-input');
    let sendBtn = document.getElementById('send-btn');

    ws.onopen = () => addMessage('System', 'Connected to chat server!');
    ws.onmessage = (e) => {
        try {
            let data = JSON.parse(e.data);
            addMessage(data.userId || 'Unknown', data.msg || 'empty');
        } catch(e) { console.error(e); }
    };
    ws.onclose = () => addMessage('System', 'Disconnected');

    function addMessage(user, msg) {
        let div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = '<span class="msg-user">' + user + ':</span> ' + msg;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    sendBtn.onclick = () => {
        let msg = input.value.trim();
        if (!msg) return;
        ws.send(JSON.stringify({ code: 'CHAT', subCode: 'CHAT', sequence: 0, request: { msg: msg } }));
        input.value = '';
    };

    input.onkeydown = (e) => { if (e.key === 'Enter') sendBtn.onclick(); };
</script>
</body>
</html>
